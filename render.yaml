services:
  - type: web
    name: pulse-bot
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      # Set your real token here in the Render dashboard (Environment tab).
      # This takes priority over the hardcoded fallback in bot.py.
      - key: BOT_TOKEN
        sync: false
      - key: DB_PATH
        value: db.json
      # Pins the Python runtime (also enforced by runtime.txt). Render has
      # defaulted new services to very new Python versions (e.g. 3.14)
      # that python-telegram-bot 21.x is not yet tested against — pin to
      # a known-good version instead of relying on Render's default.
      - key: PYTHON_VERSION
        value: 3.11.9
    # Optional: attach a persistent disk so db.json (demo wallets, trade
    # history) survives restarts/redeploys. Uncomment to enable:
    # disk:
    #   name: pulse-bot-data
    #   mountPath: /opt/render/project/src/data
    #   sizeGB: 1
